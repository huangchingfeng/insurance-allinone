<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陳柏宇・電子名片（活力新銳風）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800;900&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<style>:root{--ink:#1A2238;--muted:#6B7280}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:linear-gradient(135deg,#2563EB,#F97316);color:var(--ink);display:flex;justify-content:center;padding:24px 14px;min-height:100vh}
.card{width:100%;max-width:400px;background:#fff;border-radius:26px;padding:0 0 30px;overflow:hidden;box-shadow:0 16px 50px rgba(37,99,235,.3)}
.top{background:linear-gradient(135deg,#2563EB,#F97316);height:96px;position:relative}
.avatar{width:110px;height:110px;border-radius:50%;background:#fff;color:#2563EB;font-size:46px;font-weight:800;display:flex;align-items:center;justify-content:center;margin:-55px auto 14px;border:5px solid #fff;box-shadow:0 8px 20px rgba(0,0,0,.15)}
.inner{padding:0 26px;text-align:center}
h1{font-size:1.95rem;margin-bottom:4px}.title{display:inline-block;background:#EFF6FF;color:#2563EB;font-weight:700;padding:4px 16px;border-radius:20px;margin-bottom:18px;font-size:.9rem}
.slogan{font-size:1.1rem;font-weight:800;background:linear-gradient(90deg,#2563EB,#F97316);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:22px}
.sec-t{text-align:left;font-size:.8rem;color:#F97316;font-weight:800;letter-spacing:1px;margin:0 0 8px 2px}
.about{text-align:left;line-height:1.8;color:var(--muted);margin-bottom:20px;font-size:.92rem}
.hl{display:flex;gap:12px;text-align:left;border:2px solid #F1F5F9;border-radius:18px;padding:14px;margin-bottom:10px;align-items:center}
.hl .n{flex-shrink:0;width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,#2563EB,#F97316);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800}
.hl b{display:block}.hl span{font-size:.84rem;color:var(--muted)}
.contacts{display:flex;gap:8px;margin:22px 0}
.contacts a{flex:1;text-align:center;padding:14px 6px;border-radius:14px;background:linear-gradient(135deg,#2563EB,#3B82F6);color:#fff;text-decoration:none;font-weight:700;font-size:.9rem}
.contacts a.alt{background:linear-gradient(135deg,#F97316,#FB923C)}
.contacts a.alt2{background:#1A2238}
.qr img{border-radius:12px}.qr p{font-size:.8rem;color:var(--muted);margin-top:8px}
footer{margin-top:18px;font-size:.72rem;color:#CBD5E1}</style>
</head>
<body>
<div class="card">
  <div class="avatar">柏</div>
  <h1>陳柏宇</h1>
  <p class="title">資深壽險顧問</p>
  
  <p class="slogan">把你的保單，當成我自己的家人在顧</p>
  <p class="sec-t">關於我</p>
  <p class="about">入行 12 年，專注幫家庭與企業主把保障規劃到位。不只協助投保，更在你需要理賠的那一刻全程陪同。</p>
  <p class="sec-t">服務亮點</p>
  <div class="hl"><span class="n">1</span><div><b>退休金與資產規劃</b><span>為你的未來打造穩健的財務基礎</span></div></div>
<div class="hl"><span class="n">2</span><div><b>家庭保障健檢</b><span>找出保障缺口，量身補強</span></div></div>
<div class="hl"><span class="n">3</span><div><b>理賠全程協助</b><span>出險時陪你跑流程，不讓你孤單面對</span></div></div>
  <div class="contacts"><a href="https://line.me/R/ti/p/@chenboyu">LINE</a><a class="alt" href="tel:0912-345-678">撥電話</a><a class="alt2" href="mailto:chen.demo@example.com">寄 Email</a></div>
  <div class="qr"><img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=0&data=https%3A%2F%2Fhuangchingfeng.github.io%2Finsurance-allinone%2F" alt="QR code" width="140" height="140"><p>掃描存我的名片</p></div>
  <footer>用 Claude Artifacts 製作　·　範例版型（活力新銳風）</footer>
</div>
</body>
</html>
