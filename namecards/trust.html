<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陳柏宇・電子名片（沉穩信賴風）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800;900&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<style>:root{--bg:#F0EDE6;--card:#FFFFFF;--accent:#1A3C34;--gold:#9C7A4D;--ink:#2A2A28;--muted:#6E6A63}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif TC',serif;background:var(--bg);color:var(--ink);display:flex;justify-content:center;padding:24px 14px;min-height:100vh}
.card{width:100%;max-width:400px;background:var(--card);border-radius:8px;padding:36px 28px;text-align:center;box-shadow:0 8px 30px rgba(26,60,52,.14);border-top:5px solid var(--accent)}
.avatar{width:104px;height:104px;border-radius:50%;background:var(--accent);color:#fff;font-size:44px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;border:3px solid var(--gold)}
h1{font-size:2rem;margin-bottom:4px}.title{color:var(--gold);font-weight:600;margin-bottom:16px;letter-spacing:2px}
.divider{width:50px;height:2px;background:var(--gold);margin:0 auto 18px}
.slogan{font-size:1.05rem;line-height:1.7;color:var(--accent);margin-bottom:24px;font-weight:600}
.sec-t{text-align:left;font-size:.78rem;color:var(--gold);font-weight:700;letter-spacing:2px;margin:0 0 10px 2px;font-family:'Noto Sans TC',sans-serif}
.about{text-align:left;line-height:1.9;color:var(--muted);margin-bottom:24px;font-size:.95rem}
.hl{display:flex;gap:12px;text-align:left;padding:13px 0;border-bottom:1px solid #ECE8E0;align-items:center}
.hl .n{flex-shrink:0;width:30px;height:30px;border:2px solid var(--accent);border-radius:50%;color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Noto Sans TC',sans-serif}
.hl b{display:block;font-size:.98rem}.hl span{font-size:.84rem;color:var(--muted);font-family:'Noto Sans TC',sans-serif}
.contacts{display:flex;flex-direction:column;gap:10px;margin:24px 0 0;font-family:'Noto Sans TC',sans-serif}
.contacts a{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:6px;background:var(--accent);color:#fff;text-decoration:none;font-weight:600}
.contacts a.alt{background:#fff;color:var(--accent);border:1.5px solid var(--accent)}
.qr{margin-top:18px}.qr img{border:4px solid var(--bg)}.qr p{font-size:.8rem;color:var(--muted);margin-top:8px;font-family:'Noto Sans TC',sans-serif}
footer{margin-top:20px;font-size:.72rem;color:#B8B2A8;letter-spacing:1px;font-family:'Noto Sans TC',sans-serif}</style>
</head>
<body>
<div class="card">
  <div class="avatar">柏</div>
  <h1>陳柏宇</h1>
  <p class="title">資深壽險顧問</p>
  <div class="divider"></div>
  <p class="slogan">把你的保單，當成我自己的家人在顧</p>
  <p class="sec-t">關於我</p>
  <p class="about">入行 12 年，專注幫家庭與企業主把保障規劃到位。不只協助投保，更在你需要理賠的那一刻全程陪同。</p>
  <p class="sec-t">服務亮點</p>
  <div class="hl"><span class="n">1</span><div><b>退休金與資產規劃</b><span>為你的未來打造穩健的財務基礎</span></div></div>
<div class="hl"><span class="n">2</span><div><b>家庭保障健檢</b><span>找出保障缺口，量身補強</span></div></div>
<div class="hl"><span class="n">3</span><div><b>理賠全程協助</b><span>出險時陪你跑流程，不讓你孤單面對</span></div></div>
  <div class="contacts"><a href="https://line.me/R/ti/p/@chenboyu">＋ 加 LINE</a><a class="alt" href="tel:0912-345-678">撥電話</a><a class="alt" href="mailto:chen.demo@example.com">寄 Email</a></div>
  <div class="qr"><img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=0&data=https%3A%2F%2Fhuangchingfeng.github.io%2Finsurance-allinone%2F" alt="QR code" width="140" height="140"><p>掃描存我的名片</p></div>
  <footer>用 Claude Artifacts 製作　·　範例版型（沉穩信賴風）</footer>
</div>
</body>
</html>
