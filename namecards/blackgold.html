<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陳柏宇・電子名片（尊榮黑金風）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800;900&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<style>:root{--gold:#D4AF37;--gold2:#F0D77A;--ink:#EDE6D6;--muted:#9A927F}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif TC',serif;background:#0A0A0A;color:var(--ink);display:flex;justify-content:center;padding:24px 14px;min-height:100vh}
.card{width:100%;max-width:400px;background:linear-gradient(160deg,#141414,#0A0A0A);border:1px solid var(--gold);border-radius:10px;padding:38px 28px;text-align:center;box-shadow:0 0 40px rgba(212,175,55,.15)}
.avatar{width:104px;height:104px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0A0A0A;font-size:44px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 0 24px rgba(212,175,55,.4)}
h1{font-size:2rem;margin-bottom:4px;color:#fff}.title{color:var(--gold);font-weight:600;margin-bottom:14px;letter-spacing:3px}
.divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 18px}
.slogan{font-size:1.05rem;line-height:1.7;color:var(--gold2);margin-bottom:24px;font-style:italic}
.sec-t{text-align:left;font-size:.76rem;color:var(--gold);font-weight:700;letter-spacing:3px;margin:0 0 10px 2px;font-family:'Noto Sans TC',sans-serif}
.about{text-align:left;line-height:1.9;color:var(--muted);margin-bottom:24px;font-size:.94rem}
.hl{display:flex;gap:12px;text-align:left;padding:13px 0;border-bottom:1px solid rgba(212,175,55,.2);align-items:center}
.hl .n{flex-shrink:0;width:32px;height:32px;border:1px solid var(--gold);border-radius:50%;color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Noto Sans TC',sans-serif}
.hl b{display:block;font-size:.98rem;color:#fff}.hl span{font-size:.84rem;color:var(--muted);font-family:'Noto Sans TC',sans-serif}
.contacts{display:flex;flex-direction:column;gap:10px;margin:24px 0 0;font-family:'Noto Sans TC',sans-serif}
.contacts a{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:6px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0A0A0A;text-decoration:none;font-weight:700}
.contacts a.alt{background:transparent;color:var(--gold);border:1px solid var(--gold)}
.qr{margin-top:18px}.qr img{border:4px solid #141414;border-radius:4px}.qr p{font-size:.8rem;color:var(--muted);margin-top:8px;font-family:'Noto Sans TC',sans-serif}
footer{margin-top:20px;font-size:.72rem;color:#5A5446;letter-spacing:2px;font-family:'Noto Sans TC',sans-serif}</style>
</head>
<body>
<div class="card">
  <div class="avatar">柏</div>
  <h1>陳柏宇</h1>
  <p class="title">資深壽險顧問</p>
  <div class="divider"></div>
  <p class="slogan">把你的保單，當成我自己的家人在顧</p>
  <p class="sec-t">關於我</p>
  <p class="about">入行 12 年，專注幫家庭與企業主把保障規劃到位。不只協助投保，更在你需要理賠的那一刻全程陪同。</p>
  <p class="sec-t">服務亮點</p>
  <div class="hl"><span class="n">1</span><div><b>退休金與資產規劃</b><span>為你的未來打造穩健的財務基礎</span></div></div>
<div class="hl"><span class="n">2</span><div><b>家庭保障健檢</b><span>找出保障缺口，量身補強</span></div></div>
<div class="hl"><span class="n">3</span><div><b>理賠全程協助</b><span>出險時陪你跑流程，不讓你孤單面對</span></div></div>
  <div class="contacts"><a href="https://line.me/R/ti/p/@chenboyu">＋ 加 LINE</a><a class="alt" href="tel:0912-345-678">撥電話</a><a class="alt" href="mailto:chen.demo@example.com">寄 Email</a></div>
  <div class="qr"><img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=0&data=https%3A%2F%2Fhuangchingfeng.github.io%2Finsurance-allinone%2F" alt="QR code" width="140" height="140"><p>掃描存我的名片</p></div>
  <footer>用 Claude Artifacts 製作　·　範例版型（尊榮黑金風）</footer>
</div>
</body>
</html>
