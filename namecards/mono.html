<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陳柏宇・電子名片（極簡黑白風）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800;900&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:#fff;color:#000;display:flex;justify-content:center;padding:24px 14px;min-height:100vh}
.card{width:100%;max-width:400px;background:#fff;padding:40px 30px;border:2px solid #000}
.avatar{width:88px;height:88px;border-radius:0;background:#000;color:#fff;font-size:38px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-bottom:24px}
h1{font-size:3rem;line-height:.95;margin-bottom:8px;font-weight:900;letter-spacing:-1px}.title{font-size:1rem;font-weight:600;margin-bottom:28px;border-top:3px solid #000;padding-top:10px;display:inline-block}
.slogan{font-size:1.3rem;line-height:1.4;font-weight:800;margin-bottom:30px}
.sec-t{font-size:.72rem;letter-spacing:3px;font-weight:800;margin-bottom:10px}
.about{line-height:1.8;color:#333;margin-bottom:28px;font-size:.94rem}
.hl{display:flex;gap:12px;padding:14px 0;border-top:1px solid #000;align-items:baseline}
.hl:last-of-type{border-bottom:1px solid #000}
.hl .n{font-size:1.1rem;font-weight:900;min-width:26px}
.hl b{display:block;font-size:1rem}.hl span{font-size:.85rem;color:#666}
.contacts{display:flex;flex-direction:column;gap:8px;margin:28px 0 0}
.contacts a{display:block;padding:15px;text-align:center;background:#000;color:#fff;text-decoration:none;font-weight:700;letter-spacing:1px}
.contacts a.alt{background:#fff;color:#000;border:2px solid #000}
.qr{margin-top:24px;text-align:center}.qr p{font-size:.78rem;color:#666;margin-top:8px;letter-spacing:1px}
footer{margin-top:24px;font-size:.7rem;letter-spacing:2px;color:#999;text-align:center}</style>
</head>
<body>
<div class="card">
  <div class="avatar">柏</div>
  <h1>陳柏宇</h1>
  <p class="title">資深壽險顧問</p>
  
  <p class="slogan">把你的保單，當成我自己的家人在顧</p>
  <p class="sec-t">關於我</p>
  <p class="about">入行 12 年，專注幫家庭與企業主把保障規劃到位。不只協助投保，更在你需要理賠的那一刻全程陪同。</p>
  <p class="sec-t">服務亮點</p>
  <div class="hl"><span class="n">1</span><div><b>退休金與資產規劃</b><span>為你的未來打造穩健的財務基礎</span></div></div>
<div class="hl"><span class="n">2</span><div><b>家庭保障健檢</b><span>找出保障缺口，量身補強</span></div></div>
<div class="hl"><span class="n">3</span><div><b>理賠全程協助</b><span>出險時陪你跑流程，不讓你孤單面對</span></div></div>
  <div class="contacts"><a href="https://line.me/R/ti/p/@chenboyu">＋ 加 LINE</a><a class="alt" href="tel:0912-345-678">撥電話</a><a class="alt" href="mailto:chen.demo@example.com">寄 Email</a></div>
  <div class="qr"><img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&margin=0&data=https%3A%2F%2Fhuangchingfeng.github.io%2Finsurance-allinone%2F" alt="QR code" width="140" height="140"><p>掃描存我的名片</p></div>
  <footer>用 Claude Artifacts 製作　·　範例版型（極簡黑白風）</footer>
</div>
</body>
</html>
